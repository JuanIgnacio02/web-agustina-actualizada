<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — AGUSTINA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff7fa;
      color: #222;
      min-height: 100vh;
    }

    /* ---- LOGIN ---- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: #fff;
      border: 1px solid #f0d6e0;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 6px;
    }

    .login-box p {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ---- HEADER ADMIN ---- */
    .admin-header {
      background: #fff;
      border-bottom: 1px solid #f0d6e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
    }

    .admin-header span {
      font-size: 13px;
      color: #888;
    }

    /* ---- LAYOUT ---- */
    .admin-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 20px;
    }

    /* ---- FORMULARIO ---- */
    .card {
      background: #fff;
      border: 1px solid #f0d6e0;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    input, select, textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      border: 1px solid #e0c8d4;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: #222;
      transition: border-color .2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #c06080;
    }

    textarea { resize: vertical; min-height: 70px; }

    /* ---- BOTONES ---- */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      padding: 11px 22px;
      cursor: pointer;
      transition: opacity .2s;
    }

    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn--primary { background: #c06080; color: #fff; }
    .btn--ghost { background: transparent; border: 1px solid #e0c8d4; color: #555; }
    .btn--danger { background: #fee2e2; color: #c0392b; }
    .btn--sm { padding: 7px 14px; font-size: 13px; }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* ---- IMAGEN PREVIEW ---- */
    .img-preview {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid #f0d6e0;
      display: none;
    }

    .img-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ---- LISTA PRODUCTOS ---- */
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .product-item {
      background: #fff;
      border: 1px solid #f0d6e0;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .product-item img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: #f5e8ee;
      flex-shrink: 0;
    }

    .product-item__info { flex: 1; min-width: 0; }
    .product-item__name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-item__meta { font-size: 12px; color: #888; margin-top: 2px; }
    .product-item__price { font-weight: 600; font-size: 15px; color: #c06080; white-space: nowrap; }

    .product-item__actions { display: flex; gap: 8px; flex-shrink: 0; }

    .badge-inactivo {
      font-size: 11px;
      background: #fee2e2;
      color: #c0392b;
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: 6px;
    }

    /* ---- ALERTS ---- */
    .alert {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .alert--ok { background: #d1fae5; color: #065f46; }
    .alert--err { background: #fee2e2; color: #991b1b; }

    /* ---- LOADING ---- */
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #f0d6e0;
      padding-bottom: 0;
    }

    .tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: 'Inter', sans-serif;
    }

    .tab.active { color: #c06080; border-bottom-color: #c06080; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ---- UPLOAD ---- */
    .upload-zone {
      border: 2px dashed #e0c8d4;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      font-size: 13px;
      color: #888;
    }

    .upload-zone:hover { border-color: #c06080; color: #c06080; }
    .upload-zone input { display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>AGUSTINA</h1>
    <p>Panel de administración</p>
    <div class="form-group" style="margin-bottom:12px">
      <label>Contraseña</label>
      <input type="password" id="pwd-input" placeholder="••••••••" />
    </div>
    <div class="alert alert--err" id="login-err">Contraseña incorrecta</div>
    <button class="btn btn--primary" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- PANEL -->
<div id="admin-panel" style="display:none">

  <div class="admin-header">
    <h1>AGUSTINA — Admin</h1>
    <span>Panel de productos</span>
  </div>

  <div class="admin-body">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('agregar')">➕ Agregar producto</button>
      <button class="tab" onclick="switchTab('lista')">📋 Mis productos</button>
    </div>

    <!-- TAB: AGREGAR -->
    <div class="tab-panel active" id="tab-agregar">
      <p class="section-title">Nuevo producto</p>

      <div class="card">
        <div class="alert alert--ok" id="ok-msg">✓ Producto guardado correctamente</div>
        <div class="alert alert--err" id="err-msg">Hubo un error al guardar</div>

        <div class="form-grid">

          <div class="form-group full">
            <label>Nombre del producto *</label>
            <input type="text" id="f-name" placeholder="Ej: Taza Stitch" />
          </div>

          <div class="form-group">
            <label>Precio (ARS) *</label>
            <input type="number" id="f-price" placeholder="Ej: 9500" min="0" />
          </div>

          <div class="form-group">
            <label>Categoría *</label>
            <select id="f-cat">
              <option value="">— Elegir —</option>
              <option value="indumentaria">Indumentaria</option>
              <option value="maquillaje">Maquillaje</option>
              <option value="skincare">Skincare</option>
              <option value="tazas">Tazas</option>
              <option value="botellas-y-vasos">Botellas y vasos</option>
              <option value="regaleria">Regalería</option>
              <option value="portacosmeticos">Portacosméticos</option>
              <option value="marroquineria">Marroquinería</option>
              <option value="accesorios">Accesorios</option>
            </select>
          </div>

          <div class="form-group">
            <label>Subcategoría</label>
            <select id="f-sub">
              <option value="">— Elegir —</option>
              <option value="superior">Superior</option>
              <option value="inferior">Inferior</option>
              <option value="botellas">Botellas</option>
              <option value="vasos">Vasos</option>
              <option value="accesorios">Accesorios</option>
            </select>
          </div>

          <div class="form-group full">
            <label>Imagen del producto *</label>
            <div class="img-row">
              <div class="upload-zone" id="upload-zone" onclick="document.getElementById('f-img-file').click()">
                <input type="file" id="f-img-file" accept="image/*" onchange="previewImg(this)" />
                📷 Hacé click para subir una foto
              </div>
              <img id="img-preview" class="img-preview" src="" alt="preview" />
            </div>
            <small style="color:#aaa;font-size:12px;margin-top:4px">JPG o PNG. La imagen se sube automáticamente a Supabase.</small>
          </div>

        </div>

        <div class="form-actions">
          <button class="btn btn--primary" id="btn-save" onclick="saveProduct()">Guardar producto</button>
          <button class="btn btn--ghost" onclick="clearForm()">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- TAB: LISTA -->
    <div class="tab-panel" id="tab-lista">
      <p class="section-title">Productos cargados</p>
      <div id="product-list" class="product-list">
        <div class="loading">Cargando...</div>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = "https://srqkahdyboqannrmkqmf.supabase.co";
  const SUPABASE_KEY = "sb_publishable_C25BY4_efIwhRHoBqzYvgQ_MqMGmrI7";
  const ADMIN_PWD = "agustina2025"; // ← podés cambiar esta contraseña

  // ---- LOGIN ----
  document.getElementById("pwd-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  function doLogin() {
    const val = document.getElementById("pwd-input").value;
    if (val === ADMIN_PWD) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
    } else {
      document.getElementById("login-err").style.display = "block";
    }
  }

  // ---- TABS ----
  function switchTab(name) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    event.target.classList.add("active");
    if (name === "lista") loadProducts();
  }

  // ---- IMAGEN PREVIEW ----
  function previewImg(input) {
    const file = input.files[0];
    if (!file) return;
    const preview = document.getElementById("img-preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    document.getElementById("upload-zone").textContent = "✓ " + file.name;
  }

  // ---- SUBIR IMAGEN A SUPABASE STORAGE ----
  async function uploadImage(file) {
    const ext = file.name.split(".").pop();
    const fileName = `${Date.now()}.${ext}`;

    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/productos/${fileName}`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": file.type,
        "x-upsert": "true"
      },
      body: file
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || "Error subiendo imagen");
    }

    return `${SUPABASE_URL}/storage/v1/object/public/productos/${fileName}`;
  }

  // ---- GUARDAR PRODUCTO ----
  async function saveProduct() {
    const name = document.getElementById("f-name").value.trim();
    const price = parseInt(document.getElementById("f-price").value);
    const cat = document.getElementById("f-cat").value;
    const sub = document.getElementById("f-sub").value;
    const fileInput = document.getElementById("f-img-file");

    if (!name || !price || !cat || !fileInput.files[0]) {
      showMsg("err", "Completá nombre, precio, categoría e imagen");
      return;
    }

    const btn = document.getElementById("btn-save");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    try {
      const imageUrl = await uploadImage(fileInput.files[0]);

      const res = await fetch(`${SUPABASE_URL}/rest/v1/productos`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ name, price, image_url: imageUrl, cat, sub, activo: true })
      });

      if (!res.ok) throw new Error("Error al guardar en base de datos");

      showMsg("ok", "✓ Producto guardado correctamente");
      clearForm();

    } catch (e) {
      showMsg("err", e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar producto";
    }
  }

  // ---- CARGAR LISTA ----
  async function loadProducts() {
    const list = document.getElementById("product-list");
    list.innerHTML = `<div class="loading">Cargando...</div>`;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/productos?order=created_at.desc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });

    const products = await res.json();

    if (!products.length) {
      list.innerHTML = `<div class="loading">Todavía no hay productos cargados.</div>`;
      return;
    }

    list.innerHTML = products.map(p => `
      <div class="product-item">
        <img src="${p.image_url}" alt="${p.name}" onerror="this.src=''" />
        <div class="product-item__info">
          <div class="product-item__name">
            ${p.name}
            ${!p.activo ? '<span class="badge-inactivo">Inactivo</span>' : ''}
          </div>
          <div class="product-item__meta">${p.cat}${p.sub ? ' · ' + p.sub : ''}</div>
        </div>
        <div class="product-item__price">$${p.price.toLocaleString("es-AR")}</div>
        <div class="product-item__actions">
          <button class="btn btn--ghost btn--sm" onclick="editPrice(${p.id}, ${p.price})">✏️ Precio</button>
          <button class="btn btn--ghost btn--sm" onclick="toggleActivo(${p.id}, ${p.activo})">${p.activo ? '🙈 Ocultar' : '👁 Mostrar'}</button>
          <button class="btn btn--danger btn--sm" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}')">🗑</button>
        </div>
      </div>
    `).join("");
  }

  // ---- EDITAR PRECIO ----
  async function editPrice(id, currentPrice) {
    const newPrice = prompt(`Nuevo precio para el producto (actual: $${currentPrice.toLocaleString("es-AR")})`);
    if (!newPrice || isNaN(newPrice)) return;

    await fetch(`${SUPABASE_URL}/rest/v1/productos?id=eq.${id}`, {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ price: parseInt(newPrice) })
    });

    loadProducts();
  }

  // ---- TOGGLE ACTIVO ----
  async function toggleActivo(id, currentActivo) {
    await fetch(`${SUPABASE_URL}/rest/v1/productos?id=eq.${id}`, {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ activo: !currentActivo })
    });

    loadProducts();
  }

  // ---- ELIMINAR ----
  async function deleteProduct(id, name) {
    if (!confirm(`¿Segura que querés eliminar "${name}"?`)) return;

    await fetch(`${SUPABASE_URL}/rest/v1/productos?id=eq.${id}`, {
      method: "DELETE",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });

    loadProducts();
  }

  // ---- HELPERS ----
  function clearForm() {
    document.getElementById("f-name").value = "";
    document.getElementById("f-price").value = "";
    document.getElementById("f-cat").value = "";
    document.getElementById("f-sub").value = "";
    document.getElementById("f-img-file").value = "";
    document.getElementById("img-preview").style.display = "none";
    document.getElementById("upload-zone").textContent = "📷 Hacé click para subir una foto";
  }

  function showMsg(type, text) {
    const ok = document.getElementById("ok-msg");
    const err = document.getElementById("err-msg");
    ok.style.display = "none";
    err.style.display = "none";
    if (type === "ok") { ok.textContent = text; ok.style.display = "block"; }
    else { err.textContent = text; err.style.display = "block"; }
    setTimeout(() => { ok.style.display = "none"; err.style.display = "none"; }, 4000);
  }
</script>
</body>
</html>
