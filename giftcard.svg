<svg width="720" height="450" viewBox="0 0 720 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@300;400&display=swap');
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FDF6F0"/>
      <stop offset="100%" stop-color="#F6E2EB"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#F2C4D0" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#F2C4D0" stop-opacity="0"/>
    </radialGradient>
    <filter id="b1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="b2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="720" height="450" rx="24" fill="url(#bg)"/>
  <rect width="720" height="450" rx="24" fill="url(#glow)"/>

  <!-- Bloom acuarela lado derecho -->
  <ellipse cx="558" cy="200" rx="122" ry="158" fill="#F2C4D0" opacity="0.50" filter="url(#b1)"/>
  <ellipse cx="632" cy="136" rx="86"  ry="102" fill="#E8A0B4" opacity="0.38" filter="url(#b1)"/>
  <ellipse cx="614" cy="322" rx="96"  ry="74"  fill="#FAE8EE" opacity="0.62" filter="url(#b1)"/>
  <ellipse cx="672" cy="244" rx="62"  ry="105" fill="#F0C0D0" opacity="0.28" filter="url(#b1)"/>
  <ellipse cx="500" cy="268" rx="58"  ry="80"  fill="#D98090" opacity="0.16" filter="url(#b2)"/>

  <!-- Rosa estilizada (pétalos superpuestos) -->
  <g transform="translate(574, 218)">
    <ellipse rx="42" ry="80" fill="#F2C4D0" opacity="0.52" transform="rotate(0)"/>
    <ellipse rx="42" ry="80" fill="#E8A0B4" opacity="0.44" transform="rotate(36)"/>
    <ellipse rx="42" ry="80" fill="#EEB8C8" opacity="0.50" transform="rotate(72)"/>
    <ellipse rx="42" ry="80" fill="#E8A0B4" opacity="0.44" transform="rotate(108)"/>
    <ellipse rx="42" ry="80" fill="#F2C4D0" opacity="0.52" transform="rotate(144)"/>
    <circle r="24" fill="#C97A90" opacity="0.30"/>
    <circle r="14" fill="#D4899A" opacity="0.42"/>
    <circle r="6"  fill="#C06080" opacity="0.36"/>
  </g>

  <!-- Borde sutil -->
  <rect x="22" y="22" width="676" height="406" rx="16"
        fill="none" stroke="#DDB8C4" stroke-width="0.9" opacity="0.60"/>

  <!-- Esquinas decorativas -->
  <polyline points="22,60 22,22 60,22"
            fill="none" stroke="#C97A90" stroke-width="1.6" opacity="0.38" stroke-linecap="round"/>
  <polyline points="660,428 698,428 698,390"
            fill="none" stroke="#C97A90" stroke-width="1.6" opacity="0.38" stroke-linecap="round"/>

  <!-- Marca -->
  <text x="62" y="72"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="12" letter-spacing="7" fill="#C97A90" font-weight="400">AGUSTINA</text>
  <line x1="62" y1="83" x2="184" y2="83"
        stroke="#C97A90" stroke-width="0.7" opacity="0.55"/>

  <!-- Título Gift Card -->
  <text x="56" y="170"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="66" font-style="italic" font-weight="300"
    fill="#3B2630">Gift Card</text>

  <!-- Separador -->
  <line x1="62" y1="195" x2="330" y2="195"
        stroke="#EDE0D4" stroke-width="1" opacity="0.9"/>

  <!-- Monto -->
  <text x="58" y="264"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="58" font-weight="400"
    fill="#3B2630">$10.000</text>

  <!-- Subtítulo -->
  <text x="63" y="300"
    font-family="'Jost', Arial, sans-serif"
    font-size="10" letter-spacing="4.5" fill="#7A5A62" font-weight="300">PARA UN REGALO ESPECIAL</text>

  <!-- Separador inferior -->
  <line x1="62" y1="358" x2="445" y2="358"
        stroke="#D9C5BB" stroke-width="0.8" opacity="0.65"/>

  <!-- Código -->
  <text x="62" y="386"
    font-family="'Courier New', monospace"
    font-size="13" letter-spacing="5" fill="#9A7A82">AGT · 0000 · 0000</text>

  <!-- Pie -->
  <text x="62" y="412"
    font-family="'Jost', Arial, sans-serif"
    font-size="9.5" letter-spacing="3" fill="#B0909A" font-weight="300">SAN RAFAEL, MENDOZA</text>
</svg>
